name: Build Collège Manager CI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Rebuild better-sqlite3 for Electron
        run: npx electron-rebuild -f -w better-sqlite3 --electron-version 29.4.6
        env:
          NODE_TLS_REJECT_UNAUTHORIZED: '0'

      - name: Build Windows
        if: matrix.platform == 'win'
        run: npx vite build && npx electron-builder --win --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Build macOS
        if: matrix.platform == 'mac'
        run: npx vite build && npx electron-builder --mac --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Upload Windows artifacts
        if: matrix.platform == 'win'
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            release/*.exe
          retention-days: 30

      - name: Upload macOS artifacts
        if: matrix.platform == 'mac'
        uses: actions/upload-artifact@v4
        with:
          name: macos-installer
          path: |
            release/*.dmg
          retention-days: 30
